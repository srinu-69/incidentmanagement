{% extends "base.html" %}

{% block title %}Update Incident{% endblock %}

{% block header %}
  <h3 class="mb-0">Update Incident {{ incident.id }}</h3>
  <div class="muted">Change status, severity, or description.</div>
{% endblock %}

{% block content %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Field</label>
      <select name="field" class="form-select">
        <option value="status">Status</option>
        <option value="severity">Severity</option>
        <option value="description">Description</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">New Value</label>
      <input type="text" name="value" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-warning px-4">
      Update
    </button>

    <a href="{{ url_for('view', iid=incident.id) }}" class="btn btn-outline-secondary ms-2">
      Cancel
    </a>
  </form>
{% endblock %}
