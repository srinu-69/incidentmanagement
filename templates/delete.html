{% extends "base.html" %}
{% block title %}Delete Incident{% endblock %}
{% block content %}
<h2>Delete Incident</h2>
<p>Are you sure you want to delete incident {{ incident.id }}?</p>
<p>Status: {{ incident.status }}</p>
<form method="POST">
    <button type="submit" class="btn">Confirm Delete</button>
</form>
<a href="{{ url_for('index') }}" class="btn">Cancel</a>
{% endblock %}
