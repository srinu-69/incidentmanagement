version: '3.8'

services:

  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: srinu
      MYSQL_DATABASE: pypro
      MYSQL_USER: pyuser
      MYSQL_PASSWORD: py123
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d

  app:
    build: .
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: pyuser
      DB_PASSWORD: py123
      DB_NAME: pypro
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  db_data: